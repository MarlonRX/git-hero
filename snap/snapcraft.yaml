name: git-hero
base: core22
version: '0.1.0'
summary: Fast and visual TUI for managing Git
description: |
  A fast and visual Terminal UI (TUI) application for managing Git, written in
  Rust with Ratatui. Inspired by tools like lazygit and gitui, but focused on
  being simple, fast, and read-only to visualize your repository state and
  execute common Git actions.

grade: stable
confinement: strict

apps:
  git-hero:
    command: bin/git-hero
    plugs:
      - home
      - network
      - removable-media

parts:
  git-hero:
    plugin: rust
    source: .
    build-packages:
      - libssl-dev
      - pkg-config
    override-build: |
      cargo build --release --locked
      install -Dm755 target/release/git-hero $CRAFT_PART_INSTALL/bin/git-hero
